name: Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_NO_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # GitHub-hosted ubuntu-latest runners ship with the Android SDK
      # preinstalled (ANDROID_HOME set, licenses pre-accepted), so no
      # separate SDK install step is needed — just a JDK for Gradle.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Generate native Android project (expo prebuild)
        run: npx expo prebuild --platform android --non-interactive

      # `release`, not `debug`: a debug build expects a live Metro server
      # on the dev machine (it doesn't embed the JS bundle) and shows the
      # red "Unable to load script" screen on any device that isn't
      # tethered to one. A release build always bundles the JS + assets
      # into the APK, so it's actually standalone-installable. Expo's
      # generated build.gradle points the release signingConfig at the
      # auto-generated debug keystore by default, so this still needs no
      # signing secrets — swap that to a real keystore once this ships
      # to real users instead of testers.
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: kleep-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
